name: Documentation

on:
  push:
    branches: [ main, sprint* ]
  pull_request:
    branches: [ main, sprint* ]

jobs:
  check-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.0'

    - name: Check godoc
      run: |
        go install golang.org/x/tools/cmd/godoc@latest
        # This will fail if there are exported items without docs
        go test -v ./... 2>&1 | grep -i "warning" && exit 1 || true
