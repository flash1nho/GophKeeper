name: Build Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.0'

    - name: Build
      run: |
        mkdir -p build
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
        go build -o build/gophkeeper-${{ matrix.os }}-${{ matrix.arch }} \
        -ldflags="-X main.Version=${{ github.ref_name }} -X main.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        ./cmd/client
      env:
        CGO_ENABLED: 0

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: gophkeeper-${{ matrix.os }}-${{ matrix.arch }}
        path: build/
