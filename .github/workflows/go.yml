name: Unit Tests & Code Quality

on:
  push:
    branches: [ main, sprint10, develop ]
    paths:
      - 'app/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/tests.yml'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: |
          go mod download
          go mod verify

      - name: Run server tests
        working-directory: ./app/server
        run: |
          go test -v -race -timeout 30s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
        env:
          CGO_ENABLED: 1

      - name: Run client tests
        working-directory: ./app/client
        run: |
          go test -v -race -timeout 30s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
        env:
          CGO_ENABLED: 1

      - name: Upload server coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./app/server/coverage.out
          flags: server
          name: server-coverage
          fail_ci_if_error: false

      - name: Upload client coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./app/client/coverage.out
          flags: client
          name: client-coverage
          fail_ci_if_error: false

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run golangci-lint for server
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ./app/server
          version: latest
          args: --timeout 5m

      - name: Run golangci-lint for client
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ./app/client
          version: latest
          args: --timeout 5m

      - name: Run go fmt check
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code formatting issues found. Run 'go fmt ./...' to fix."
            exit 1
          fi

  sec:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out results.json ./app/...'

      - name: Upload security scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.json

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          # Исключить некоторые комбинации для ускорения
          - os: windows
            arch: arm64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build server for ${{ matrix.os }}/${{ matrix.arch }}
        working-directory: ./app/server
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -v -o ../../bin/gophkeeper-server-${{ matrix.os }}-${{ matrix.arch }} .

      - name: Build client for ${{ matrix.os }}/${{ matrix.arch }}
        working-directory: ./app/client
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -v -o ../../bin/gophkeeper-client-${{ matrix.os }}-${{ matrix.arch }} .

  integration-test:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: gophkeeper
          POSTGRES_PASSWORD: gophkeeper
          POSTGRES_DB: gophkeeper_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U gophkeeper; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run integration tests
        working-directory: ./app/server
        run: |
          go test -v -tags=integration -timeout 60s ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: gophkeeper
          DB_PASSWORD: gophkeeper
          DB_NAME: gophkeeper_test
          DB_SSLMODE: disable

  coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Calculate combined coverage
        run: |
          echo "=== Server Coverage ===" >> $GITHUB_STEP_SUMMARY
          cd app/server && go test -v -coverprofile=coverage.out ./... && \
            echo "Coverage: $(go tool cover -func=coverage.out | tail -1)" >> $GITHUB_STEP_SUMMARY || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=== Client Coverage ===" >> $GITHUB_STEP_SUMMARY
          cd ../client && go test -v -coverprofile=coverage.out ./... && \
            echo "Coverage: $(go tool cover -func=coverage.out | tail -1)" >> $GITHUB_STEP_SUMMARY || true

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Test Coverage Report\n\n${summary}`
            });

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [test, lint, sec, build]
    if: always()

    steps:
      - name: Check workflow status
        id: check
        run: |
          if [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.sec.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Workflow status summary
        run: |
          echo "### Workflow Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.sec.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall**: ${{ steps.check.outputs.status == 'success' && '✅ PASSED' || '❌ FAILED' }}" >> $GITHUB_STEP_SUMMARY
