name: Go Tests and Build

on:
  push:
    branches: [ main, sprint* ]
  pull_request:
    branches: [ main, sprint* ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: linux
            arch: arm64
          - os: windows
            arch: arm64
          - os: darwin
            arch: amd64
        go-version: ['1.25.0']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '${{ matrix.go-version }}'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Build client for ${{ matrix.os }}/${{ matrix.arch }}
      working-directory: ./app/client
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
      run: |
        go build -v -o ../../bin/gophkeeper-client-${{ matrix.os }}-${{ matrix.arch }} .
