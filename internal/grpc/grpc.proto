syntax = "proto3";

package grpc;

option go_package = "grpc/grpc";

service GophKeeperPublicService {
  rpc Register (UserRegisterRequest) returns (UserRegisterResponse);
  rpc Login (UserLoginRequest) returns (UserLoginResponse);
}

message UserRegisterRequest {
  string login = 1;
  string password = 2;
}

message UserRegisterResponse {
  string token = 1;
}

message UserLoginRequest {
  string login = 1;
  string password = 2;
}

message UserLoginResponse {
  string token = 1;
}

service GophKeeperPrivateService {
  rpc TextNoteCreate (TextNoteCreateRequest) returns (CreateResponse);
}

message TextNoteCreateRequest {
  string token = 1;
  string content = 2;
}

message CreateResponse {
  uint32 id = 1;
}
